<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>兒童成長小幫手｜載入中</title>
    <meta name="robots" content="noindex" />
    <script>
      // GitHub Pages 對找不到的路徑會回傳這個檔案。
      // 不論使用者輸入 /tw-growth-helper 或任何子路徑，一律導回 app 根路徑，
      // 避免行動裝置在沒有 trailing slash 時落到空白頁。
      (function () {
        var base = '/tw-growth-helper/';
        var target = base + location.search + location.hash;
        location.replace(target);
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=/tw-growth-helper/" />
  </head>
  <body>
    正在前往 <a href="/tw-growth-helper/">兒童成長小幫手</a>…
  </body>
</html>
